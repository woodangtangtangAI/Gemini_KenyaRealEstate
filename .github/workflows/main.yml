name: Kenya Real Estate Pipeline

on:
  schedule:
    - cron: '0 2 * * 2'  # 매 화요일 케냐 시간 05:00 (한국 시간 11:00)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: 1. 데이터 수집 (Scraping)
        run: python scraper.py
        
      - name: 2. 거시경제 데이터 결합
        run: python "Kenya 거시경제.py"
        
      - name: 3. 임대수익률 분석 및 예측 (XGBoost)
        run: python ml_predict.py
        
      - name: 4. AI 리포트 작성 및 이메일 발송
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python send_report.py

      - name: 5. 구글 드라이브 업로드 (Upload to Google Drive)
        env:
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
        run: |
          python -c "import os, json; json.dump(json.loads(os.environ['GDRIVE_TOKEN_JSON']), open('token.json', 'w'))"
          python upload_to_gdrive.py
